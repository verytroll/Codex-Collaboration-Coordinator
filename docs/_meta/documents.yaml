schema_version: 1
metadata_strategy:
  embedded_front_matter: deferred
  canonical_registry: docs/_meta/documents.yaml
  rationale:
    - Markdown files are consumed directly from Git and release bundles.
    - The repository has no docs pipeline that parses front matter today.
    - A central registry keeps metadata machine-readable without creating large noisy edits in every doc file.

